<!DOCTYPE html>
<html>

<head>
    <title>Сайт з таблицею і кнопками</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <h1>Таблиця з кнопками</h1>

            <tr>
                <th>Ім'я</th>
                <th>Прізвище</th>
                <th>Вік</th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Іван</td>
                <td>Петров</td>
                <td>25</td>
                <td><button class="edit-button">Редагувати</button></td>
                <td><button class="delete-button">Видалити</button></td>
            </tr>
            <tr>
                <td>Марія</td>
                <td>Іванова</td>
                <td>30</td>
                <td><button class="edit-button">Редагувати</button></td>
                <td><button class="delete-button">Видалити</button></td>
            </tr>
        </tbody>
    </table>

    <button id="add-button">Додати</button>

    <script src="app.js"></script>
</body>

</html>
