<!DOCTYPE html>
<html>

<head>
    <title>Управління переміщеннями жк "Софія Київська"</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="photo_2023-10-31_02-28-49.jpg" alt="Житловий Комплекс 'Софія Київський'">
        </div>
        <h1>Заявки для в'їзду в жк "Софія Київська"</h1>
    </header>
    <div class="container">
        <div class="table-container">
            <h1>Заявки</h1>
            <table class="custom-table" id="pendingApplicationsTable">
                <thead>
                    <tr>
                        <th class="application-number">№ Заявки</th>
                        <th>Ім'я</th>
                        <th class="id">ID</th>
                        <th>Юзернейм</th>
                        <th>Адреса</th>
                        <th>Авто</th>
                        <th>К-сть гостей</th>
                        <th>Час</th>
                        <th>Статус</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Заявки, які очікують підтвердження, додаються сюди через JavaScript -->
                </tbody>
            </table>
            <table class="custom-table" id="confirmedApplicationsTable">
                <tbody>
                    <!-- Заявки, підтверджені або відхилені, додаються сюди через JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    <footer>
        <p>Софія Київський ЖК &copy; 2023. Додаткова інформація: адреса, телефон, email</p>
    </footer>
    <script src="app.js"></script>
</body>

</html>
